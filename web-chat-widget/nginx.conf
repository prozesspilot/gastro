server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip-Komprimierung
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # /health — vom Deploy-Smoke gecurlt (curl chat.prozesspilot.net/health)
    # und vom Container-Healthcheck. JSON wie der frühere Stub.
    location = /health {
        access_log off;
        default_type application/json;
        return 200 "{\"status\":\"ok\",\"service\":\"web-chat-widget\"}";
    }

    # API-Proxy zu Backend — das Widget ruft /api/v1/chat/... relativ auf.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (Live-Chat /:token/events): kein Buffering, lange Lese-Timeouts.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Statische Assets mit langem Cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA-Fallback: /<token> + alle anderen Routen an index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
