# DECISION: Interne Services (postgres, redis, minio) sind nicht nach außen
# erreichbar. Caddy (System-Service, nicht Container) macht TLS-Terminierung
# auf Port 80/443 und routet zu den Containern auf localhost:8080-8083.
#
# T012: webapp-Ports von 80/443 auf 127.0.0.1:8081:80 geaendert,
# damit Caddy die Ports 80+443 halten kann.
#
# T012 Review-Fix M1: `deploy.resources.limits` ersetzt durch Top-Level
# `mem_limit` + `mem_reservation` — `deploy.*` wird im plain `docker compose`
# (Non-Swarm) stillschweigend ignoriert.
#
# IONOS 4 GB RAM Budget (Phase 4):
#   postgres 1G, n8n 800M, backend 768M, redis 256M, minio 256M, webapp 128M,
#   stubs 32M (1 Container für setup+chat) = ~3.3 GB Container + ~700 MB OS-Reserve.
#   4G Swap als Notfall-Puffer.

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

services:
  # ── Datenbank ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    # IONOS 4 GB RAM: postgres-Tuning für kleinen Host.
    command: >-
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=512MB
      -c max_connections=80
    environment:
      POSTGRES_USER: pp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pp_secret}
      POSTGRES_DB: prozesspilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pp -d prozesspilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    mem_reservation: 512m

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m

  # ── MinIO S3-kompatibler Objektspeicher ───────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PP_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PP_S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    # T012 Review-Fix B2a: image:-Direktive ergänzt, damit `docker compose pull`
    # im Deploy-Workflow das frisch in CI gebaute Image zieht (statt No-Op).
    # build:-Direktive bleibt für lokale Builds & Fallback.
    image: ghcr.io/prozesspilot/gastro/backend:latest
    pull_policy: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # T012: Port nur auf Localhost binden — Caddy routet api.prozesspilot.net → :8080
    ports:
      - "127.0.0.1:8080:3000"
    networks:
      - internal
      - external
    # Node-basierter Healthcheck: wget ist im node:20-slim-Image nicht zuverlässig
    # für 127.0.0.1 (IPv4/IPv6-Auflösung). Fastify listet auf 0.0.0.0:3000.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    mem_limit: 768m
    mem_reservation: 512m

  # ── Webapp / Nginx ─────────────────────────────────────────────────────────
  webapp:
    # T012 Review-Fix B2a: image:-Direktive ergänzt (analog backend).
    image: ghcr.io/prozesspilot/gastro/webapp:latest
    pull_policy: always
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.prozesspilot.net}
        VITE_N8N_URL: ${VITE_N8N_URL:-http://localhost:5678}
    restart: always
    # T012: Nur auf Localhost binden — Caddy routet admin.prozesspilot.net → :8081
    # Ports 80+443 haelt jetzt Caddy (System-Service), nicht dieser Container.
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 128m
    mem_reservation: 64m

  # ── Healthcheck-Stub: Platzhalter für setup.* + chat.* (NH2: konsolidiert) ──
  # T012 Review-Fix NH2: setup-stub + chat-stub zu einem Service zusammengeführt.
  # Container hört auf :8080 und bekommt zwei Port-Bindings (8082 + 8083).
  # Caddy routet:
  #   setup.prozesspilot.net → 127.0.0.1:8082 → Container :8080 (bis T016)
  #   chat.prozesspilot.net  → 127.0.0.1:8083 → Container :8080 (bis Widget-Task)
  stubs:
    # T012 Review-Fix B2a: image:-Direktive ergänzt.
    image: ghcr.io/prozesspilot/gastro/healthcheck-stub:latest
    pull_policy: always
    build:
      context: ./infra/healthcheck-stub
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8082:8080"
      - "127.0.0.1:8083:8080"
    networks:
      - external
    # T012 Review-Fix M4: 127.0.0.1 statt localhost — musl-libc resolved
    # localhost ggf. erst zu ::1 (IPv6), Caddy-Alpine bindet aber auf 0.0.0.0 IPv4.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 32m
    mem_reservation: 16m

  # ── n8n Workflow-Engine ────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: always
    # T012 Review-Fix B1: NUR auf Localhost binden — kein Public-Exposure.
    # n8n hat per Default keinen Auth-Zwang und Workflows enthalten Secrets.
    # Wenn externer Zugriff nötig wird: eigene Subdomain via Caddy mit Auth.
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${DB_USER:-pp}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-pp_secret}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme_32chars_min}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    mem_limit: 800m
    mem_reservation: 512m
