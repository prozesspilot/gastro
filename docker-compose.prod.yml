# DECISION: Interne Services (postgres, redis, minio) sind nicht nach außen
# erreichbar. Caddy (System-Service, nicht Container) macht TLS-Terminierung
# auf Port 80/443 und routet zu den Containern auf localhost:8080-8084.
#
# T012: webapp-Ports von 80/443 auf 127.0.0.1:8081:80 geaendert,
# damit Caddy die Ports 80+443 halten kann.
#
# T012 Review-Fix M1: `deploy.resources.limits` ersetzt durch Top-Level
# `mem_limit` + `mem_reservation` — `deploy.*` wird im plain `docker compose`
# (Non-Swarm) stillschweigend ignoriert.
#
# IONOS 4 GB RAM Budget (Phase 4):
#   postgres 1G, backend 768M, redis 256M, minio 256M, webapp 128M,
#   onboarding-wizard 128M, web-chat-widget 128M (T072, ersetzt den 32M-chat-Stub).
#   n8n per `profiles` deaktiviert (T064, spart 800M). 4G Swap als Notfall-Puffer.

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

services:
  # ── Datenbank ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    # IONOS 4 GB RAM: postgres-Tuning für kleinen Host.
    command: >-
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=512MB
      -c max_connections=80
    environment:
      POSTGRES_USER: pp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pp_secret}
      POSTGRES_DB: prozesspilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pp -d prozesspilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    mem_reservation: 512m

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m

  # ── MinIO S3-kompatibler Objektspeicher ───────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PP_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PP_S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    # T012 Review-Fix B2a: image:-Direktive ergänzt, damit `docker compose pull`
    # im Deploy-Workflow das frisch in CI gebaute Image zieht (statt No-Op).
    # build:-Direktive bleibt für lokale Builds & Fallback.
    image: ghcr.io/prozesspilot/gastro/backend:latest
    pull_policy: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # T012: Port nur auf Localhost binden — Caddy routet api.prozesspilot.net → :8080
    ports:
      - "127.0.0.1:8080:3000"
    networks:
      - internal
      - external
    # Node-basierter Healthcheck: wget ist im node:20-slim-Image nicht zuverlässig
    # für 127.0.0.1 (IPv4/IPv6-Auflösung). Fastify listet auf 0.0.0.0:3000.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    mem_limit: 768m
    mem_reservation: 512m

  # ── Webapp / Nginx ─────────────────────────────────────────────────────────
  webapp:
    # T012 Review-Fix B2a: image:-Direktive ergänzt (analog backend).
    image: ghcr.io/prozesspilot/gastro/webapp:latest
    pull_policy: always
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.prozesspilot.net}
        VITE_N8N_URL: ${VITE_N8N_URL:-http://localhost:5678}
    restart: always
    # T012: Nur auf Localhost binden — Caddy routet admin.prozesspilot.net → :8081
    # Ports 80+443 haelt jetzt Caddy (System-Service), nicht dieser Container.
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 128m
    mem_reservation: 64m

  # ── Onboarding-Wizard (setup.prozesspilot.net) ──────────────────────────────
  # T017: ersetzt den setup-Stub. Static-Build (Vite) hinter nginx; nginx proxyt
  # /api/ → backend:3000 und liefert /<token> via SPA-Fallback. Caddy routet
  # setup.prozesspilot.net → 127.0.0.1:8082 → Container :80.
  # RAM (~128 MB) gedeckt durch die per T064 freigewordene n8n-Reservierung.
  onboarding-wizard:
    image: ghcr.io/prozesspilot/gastro/onboarding-wizard:latest
    pull_policy: always
    build:
      context: ./onboarding-wizard
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 128m
    mem_reservation: 64m

  # ── Web-Chat-Widget (chat.prozesspilot.net) ─────────────────────────────────
  # T072: ersetzt den chat-Healthcheck-Stub. Static-Build (Vite) hinter nginx;
  # nginx proxyt /api/ → backend:3000 (inkl. SSE) und liefert /<token> via
  # SPA-Fallback. Caddy routet chat.prozesspilot.net → 127.0.0.1:8084 → Container :80.
  # RAM (~128 MB) gedeckt durch die per T064 freigewordene n8n-Reservierung.
  web-chat-widget:
    image: ghcr.io/prozesspilot/gastro/web-chat-widget:latest
    pull_policy: always
    build:
      context: ./web-chat-widget
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8084:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 128m
    mem_reservation: 64m

  # ── n8n Workflow-Engine ────────────────────────────────────────────────────
  # T064 (2026-06-18): n8n ist im Pilot eingefroren/ungenutzt und crashte auf Prod
  # in einer Endlosschleife (`database "n8n" does not exist` — die DB wurde nie
  # angelegt). Per `profiles` deaktiviert → startet NICHT mehr bei
  # `docker compose up -d` (auch nicht im Deploy). Spart die 800-MB-Reservierung
  # auf dem 4-GB-Host und beendet den Crash-Loop.
  # REAKTIVIEREN (sobald M10/M11 n8n brauchen):
  #   1) DB anlegen (Name = N8N_DB_NAME aus .env.prod, default "n8n"):
  #        docker compose -f docker-compose.prod.yml exec postgres \
  #          psql -U pp -c 'CREATE DATABASE n8n;'
  #   2) starten:    docker compose -f docker-compose.prod.yml --profile optional up -d n8n
  n8n:
    profiles: ["optional"]
    image: n8nio/n8n:latest
    restart: always
    # T012 Review-Fix B1: NUR auf Localhost binden — kein Public-Exposure.
    # n8n hat per Default keinen Auth-Zwang und Workflows enthalten Secrets.
    # Wenn externer Zugriff nötig wird: eigene Subdomain via Caddy mit Auth.
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${DB_USER:-pp}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-pp_secret}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme_32chars_min}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    mem_limit: 800m
    mem_reservation: 512m
