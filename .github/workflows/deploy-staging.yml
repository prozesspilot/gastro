name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest,ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build & Push Discord-Bot Image
        uses: docker/build-push-action@v5
        with:
          context: ./discord-bot
          push: true
          tags: ghcr.io/${{ github.repository }}/discord-bot:latest

      - name: SSH Deploy on IONOS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          key: ${{ secrets.IONOS_SSH_KEY }}
          script: |
            cd /opt/gastro
            docker compose pull
            docker compose up -d
            docker compose exec -T backend npm run migrate

      - name: Health-Check
        run: |
          sleep 10
          curl -f https://api.prozesspilot.net/health || exit 1

      - name: Discord-Notification Erfolg
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_DEPLOYMENT_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "🚀 **Deploy erfolgreich** auf IONOS\nCommit: `${{ github.sha }}`\nAlle Services laufen."}'

      - name: Discord-Notification Fehler
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_ALERTS_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ **Deploy fehlgeschlagen** auf IONOS\nCommit: `${{ github.sha }}`\nLogs prüfen: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
