# DECISION: Interne Services (postgres, redis, minio) sind nicht nach außen
# erreichbar. Nur webapp (80/443) und n8n (5678) sind extern zugänglich.
#
# IONOS 4 GB RAM Budget (Phase 4):
#   postgres 1G, n8n 800M, backend 768M, redis 256M, minio 256M, webapp 128M
#   = 3.2 GB Container + ~800 MB OS-Reserve. 4G Swap als Notfall-Puffer.

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

services:
  # ── Datenbank ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    # IONOS 4 GB RAM: postgres-Tuning für kleinen Host.
    command: >-
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=512MB
      -c max_connections=80
    environment:
      POSTGRES_USER: pp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pp_secret}
      POSTGRES_DB: prozesspilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pp -d prozesspilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ── MinIO S3-kompatibler Objektspeicher ───────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PP_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PP_S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Webapp / Nginx ─────────────────────────────────────────────────────────
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # ── n8n Workflow-Engine ────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${DB_USER:-pp}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-pp_secret}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme_32chars_min}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          memory: 800M
