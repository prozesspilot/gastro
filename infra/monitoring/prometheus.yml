global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # Externes Label fuer Multi-Instance-Szenarien
  external_labels:
    project: 'prozesspilot'
    env: 'local'

scrape_configs:
  - job_name: 'prozesspilot-backend'
    # Decision: host.docker.internal erlaubt Zugriff auf den Host aus Docker heraus.
    # Auf Linux ggf. extra-hosts: ["host.docker.internal:host-gateway"] noetig.
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 8s
