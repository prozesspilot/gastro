name: Task Tracker

# Postet automatisch in Discord, wenn jemand eine Task-Datei zwischen
# tasks/_backlog/, tasks/_in_progress/ und tasks/_done/ verschiebt
# (via `git mv`). Erkennt Renames via `git diff --name-status -M`.
#
# Trigger-Strategie:
#   * main-Branch     → alle Übergänge melden (final-state)
#   * Feature-Branch  → NUR Start-Übergänge melden (_backlog → _in_progress
#                       oder _backlog → _done). "X startet Task Y" passiert
#                       im Feature-Branch, nicht im Merge.
#                       Verhindert Doppel-Posts: wenn auf Feature-Branch
#                       schon "startet" gepostet wurde, postet main beim
#                       Merge nichts mehr (gleiche Übergang-Detection
#                       greift dort nicht — Task ist auf main jetzt
#                       _in_progress oder _done, kein erneuter Rename).
#
# Übergänge:
#   _backlog        → _in_progress   → 🟢 "X startet Task Y"
#   _in_progress    → _done          → ✅ "Task Y abgeschlossen"
#   _backlog        → _done          → ✅ "Task Y direkt erledigt"
#   _done           → _in_progress   → 🔄 "X hat wieder geöffnet"
#   _in_progress    → _backlog       → ↩️ "X hat zurückgestellt"
#   _done           → _backlog       → ↩️ "X hat zurück ins Backlog gestellt"
#
# Owner-Erkennung:
#   1. Aus Filename-Convention: TXXX-<owner>-<rest>.md → <owner>
#   2. Fallback: Commit-Author (github.event.head_commit.author.name)
#
# Title-Erkennung:
#   Erste Markdown-Zeile (# TXXX — <Titel>) aus dem (Ziel-)File

on:
  push:
    branches:
      - main
      - 'andreas/**'
      - 'steve/**'
      - 'gemeinsam/**'
      - 'server/**'
    paths:
      - 'tasks/_backlog/**'
      - 'tasks/_in_progress/**'
      - 'tasks/_done/**'

jobs:
  detect-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Wir vergleichen den kompletten Push-Range (vor → nach),
          # nicht nur den letzten Commit. fetch-depth: 0 lädt alle Commits,
          # was bei großen Repos teuer ist, aber zuverlässig.
          fetch-depth: 0

      - name: Detect Task-Moves und poste Discord-Notifications
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEV_LOG_WEBHOOK }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          BRANCH_NAME: ${{ github.ref_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -e

          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_DEV_LOG_WEBHOOK nicht gesetzt — überspringe."
            exit 0
          fi

          # Auf Feature-Branches melden wir NUR Start-Übergänge.
          # Auf main melden wir alle Übergänge.
          # Verhindert Doppel-Posts: Start-Post passiert beim Feature-Branch-Push,
          # nicht nochmal beim Merge auf main (weil dort kein neuer Rename ist).
          if [ "$BRANCH_NAME" = "main" ]; then
            scope="main"
          else
            scope="feature"
          fi
          echo "Branch: $BRANCH_NAME | Scope: $scope"

          # Renames im KOMPLETTEN Push-Range ermitteln (vor → nach).
          # Vorher: nur HEAD~1 → HEAD, was bei Multi-Commit-Pushes Renames in
          # früheren Commits verloren hat. Jetzt: github.event.before/after
          # spannt den ganzen Push auf.
          # Sonderfälle:
          #   * Erster Push auf neuen Branch: before = 0000...0000
          #     → Fallback auf HEAD~1 vs. HEAD (best-effort)
          #   * Force-push: vorheriger SHA existiert lokal evtl. nicht
          if [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$PUSH_BEFORE" ]; then
            echo "Erster Push auf Branch (oder PUSH_BEFORE leer) — Fallback auf HEAD~1..HEAD"
            range="HEAD~1..HEAD"
          else
            range="${PUSH_BEFORE}..${PUSH_AFTER}"
            echo "Push-Range: $range"
          fi

          # Format: R100<TAB>tasks/_backlog/T015-...md<TAB>tasks/_in_progress/T015-andreas-...md
          renames=$(git diff --name-status -M "$range" -- 'tasks/_backlog/' 'tasks/_in_progress/' 'tasks/_done/' 2>/dev/null \
            | awk '/^R[0-9]+\t/' || true)

          if [ -z "$renames" ]; then
            echo "Keine Task-Renames in diesem Commit."
            exit 0
          fi

          echo "$renames" | while IFS=$'\t' read -r _status old_path new_path; do
            echo "Rename erkannt: $old_path → $new_path"

            # Quelle/Ziel-Bucket extrahieren
            old_bucket=$(echo "$old_path" | sed -E 's|tasks/(_[a-z_]+)/.*|\1|')
            new_bucket=$(echo "$new_path" | sed -E 's|tasks/(_[a-z_]+)/.*|\1|')

            # Relevante Übergänge — die häufigen 3 + Reopen + Cancel.
            transition="${old_bucket}→${new_bucket}"
            case "$transition" in
              "_backlog→_in_progress") emoji="🟢"; verb="startet" ;;
              "_in_progress→_done")    emoji="✅"; verb="hat abgeschlossen" ;;
              "_backlog→_done")        emoji="✅"; verb="hat direkt erledigt" ;;
              "_done→_in_progress")    emoji="🔄"; verb="hat wieder geöffnet" ;;
              "_in_progress→_backlog") emoji="↩️"; verb="hat zurückgestellt" ;;
              "_done→_backlog")        emoji="↩️"; verb="hat zurück ins Backlog gestellt" ;;
              *)
                echo "  Übergang $transition wird nicht beachtet."
                continue ;;
            esac

            # Auf Feature-Branches: nur Start-Übergänge melden.
            # Alles andere (done, reopen, cancel) ist erst nach Merge auf main relevant.
            if [ "$scope" = "feature" ]; then
              case "$transition" in
                "_backlog→_in_progress"|"_backlog→_done") ;; # erlaubt
                *)
                  echo "  Übergang $transition auf Feature-Branch wird übersprungen (kommt beim main-Merge)."
                  continue ;;
              esac
            fi

            # Task-Titel aus erster Markdown-Zeile (# TXXX — Titel)
            title=$(head -1 "$new_path" | sed -E 's/^# *//' || echo "(unbekannt)")

            # Owner aus Filename extrahieren: TXXX-<owner>-<rest>.md
            owner_from_file=$(basename "$new_path" | sed -nE 's/^T[0-9]+-([a-z]+)-.*/\1/p')
            # Capitalize first letter (steve → Steve, andreas → Andreas)
            if [ -n "$owner_from_file" ]; then
              owner="$(echo "${owner_from_file:0:1}" | tr a-z A-Z)${owner_from_file:1}"
            else
              owner="$COMMIT_AUTHOR"
            fi

            # Branch-Info nur auf Feature-Branches — auf main redundant
            if [ "$scope" = "feature" ]; then
              branch_line="\nBranch: \`$BRANCH_NAME\`"
            else
              branch_line=""
            fi

            # Discord-Post
            content=$(printf "%s **%s %s**: %s%s\n%s" \
              "$emoji" "$owner" "$verb" "$title" "$branch_line" "$COMMIT_URL")
            payload=$(jq -nc \
              --arg c "$content" \
              '{content: $c, allowed_mentions: {parse: []}}')

            echo "Sende Discord-Post: $content"
            curl -fsS -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              -o /dev/null -w "HTTP %{http_code}\n" || true
          done
